name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all release checks but do not publish"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 only bundles npm 10.x.
      - run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm run check:types
      - run: npm test
      - run: npm run test:update
      - run: npm run smoke
      - run: npm run pack:check

      - name: Publish core
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/core --access public --provenance

      - name: Publish statusline
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/statusline --access public --provenance

      - name: Publish daemon
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/daemon --access public --provenance

