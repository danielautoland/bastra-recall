name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all release checks but do not publish"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14"
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 only bundles npm 10.x.
      - run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm run check:types
      - run: npm test
      - run: npm run test:update
      - run: npm run smoke
      - run: npm run pack:check

      - name: Publish core
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/core --access public --provenance

      - name: Publish statusline
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/statusline --access public --provenance

      - name: Publish daemon
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --workspace=@bastra-recall/daemon --access public --provenance

